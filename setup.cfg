[flake8]
max-line-length = 120
exclude = .git,__pycache__,build,dist,venv,.venv
ignore = E203, W503

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = modules,utils
omit = tests/*

[coverage:report]
show_missing = true
fail_under = 70
